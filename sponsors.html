<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REVIVE | SPONSORS</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .sponsor-tier {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            border-left: 4px solid var(--neon-cyan);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .sponsor-logo {
            width: 150px;
            height: 80px;
            background: #0f172a;
            border: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slate-text);
            filter: grayscale(1);
            transition: 0.3s;
        }
        .sponsor-logo:hover {
            filter: grayscale(0);
            border-color: var(--neon-green);
        }
        
        /* هذا الكود الجديد لضبط مقاس الصور داخل المربع */
        .sponsor-logo img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <header class="banner">
        <div class="scanline"></div>
        <nav class="button-group">
            <a href="index.html" class="btn btn-gaming">HOME</a>
            <a href="about_us.html" class="btn btn-gaming">ABOUT US</a>
        </nav>
    </header>

    <section class="hero">
        <h1 class="glitch-text">OUR ALLIES</h1>
        
        <div class="sponsor-tier">
            <h2 style="width: 100%; color: var(--neon-green); font-size: 14px; letter-spacing: 3px;">[ ELITE SPONSORS ]</h2>
            <div class="sponsor-logo"><img src="Images/baheya.png" alt="Logo 01"></div>
            <div class="sponsor-logo"><img src="Images/HammamGym.png" alt="Logo 02"></div>
            <div class="sponsor-logo"><img src="Images/c5Gym.png" alt="Logo 03"></div>
        </div>

        <div class="sponsor-tier" style="border-left-color: var(--slate-text); margin-bottom: 40px;">
            <h2 style="width: 100%; color: var(--slate-text); font-size: 14px; letter-spacing: 3px;">[ STRATEGIC PARTNERS ]</h2>
            <div class="sponsor-logo"><img src="Images/eliteGYM.png" alt="Partner A"></div>
            <div class="sponsor-logo"><img src="Images/CityToys.png" alt="Partner B"></div>
            <div class="sponsor-logo"><img src="Images/sayadPharmacy.png" alt="Partner C"></div>
        </div>

        <a href="mailto:contact@revive.com" class="btn btn-action">BECOME A SPONSOR</a>
    </section>

    <footer class="footer-hud">
        <div class="scanline"></div>
        <div class="footer-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <p class="names">REVIVE // SPONSORSHIP HUB</p>
            <p class="copyright">&copy; 2026. SECURE CONNECTION.</p>
        </div>
    </footer>
</body>
</html>
