<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REVIVE | SPONSORS</title>
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        .sponsor-tier {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 900px; /* كبّرنا العرض شوية عشان يشيل صور أكتر */
            margin-top: 20px;
            border-left: 4px solid var(--neon-cyan);
            display: flex;
            flex-wrap: wrap;
            gap: 30px; /* مسافة أكبر بين العناصر */
            justify-content: center;
            margin-bottom: 50px;
        }

        /* حاوية لكل سبونسر (الصورة + الاسم) */
        .sponsor-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .sponsor-logo {
            width: 180px; /* كبّرنا المربع شوية */
            height: 100px;
            background: #0f172a;
            border: 1px solid #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: grayscale(1);
            transition: 0.3s;
        }

        /* اسم السبونسر */
        .sponsor-name {
            color: var(--slate-text);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        /* تأثير عند مرور الماوس على العنصر بالكامل */
        .sponsor-item:hover .sponsor-logo {
            filter: grayscale(0);
            border-color: var(--neon-green);
            transform: translateY(-5px); /* حركة خفيفة لفوق */
        }

        .sponsor-item:hover .sponsor-name {
            color: var(--neon-green);
        }
        
        .sponsor-logo img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <header class="banner">
        <div class="scanline"></div>
        <nav class="button-group">
            <a href="index.html" class="btn btn-gaming">HOME</a>
            <a href="about_us.html" class="btn btn-gaming">ABOUT US</a>
        </nav>
    </header>

    <section class="hero">
        <h1 class="glitch-text">Thanks For Our Sponsors!!</h1>
        
        <div class="sponsor-tier">
            
            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/baheya.png" alt="Baheya"></div>
                <span class="sponsor-name">بهية</span>
            </div>

            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/HammamGym.PNG" alt="Hammam Gym"></div>
                <span class="sponsor-name">Hammam Gym</span>
            </div>

            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/c5Gym.PNG" alt="C5 Gym"></div>
                <span class="sponsor-name">C5 Gym</span>
            </div>

            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/eliteGYM.PNG" alt="Elite Gym"></div>
                <span class="sponsor-name">Elite Gym</span>
            </div>

            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/CityToys.PNG" alt="City Toys"></div>
                <span class="sponsor-name">City Toys</span>
            </div>

            <div class="sponsor-item">
                <div class="sponsor-logo"><img src="Images/sayadPharmacy.PNG" alt="Sayad Pharmacy"></div>
                <span class="sponsor-name">Sayad Pharmacy</span>
            </div>
        </div>

        <a href="mailto:contact@revive.com" class="btn btn-action">BECOME A SPONSOR</a>
    </section>

    <footer class="footer-hud">
        <div class="footer-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <p class="names">REVIVE // SPONSORSHIP HUB</p>
            <p class="copyright">&copy; 2026.</p>
        </div>
    </footer>
</body>
</html>
